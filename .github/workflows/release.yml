name: Release Catalog

# Release a single typed catalog asset.
#
# Pick the catalog (family/service, e.g. storage/object) + the asset type. The
# delivery-toolkit compiles ONE typed catalog — CapabilityCatalog / ControlCatalog
# / ThreatCatalog — there is no omnibus. The release artifact IS that single typed
# catalog.
#
# Then (augmenting the old release flow) two publishing steps run:
#   1. NEW: grcli validates the artifact against the Gemara spec and publishes it to
#      grc.store. repository = metadata.author.id/metadata.id, tag = metadata.version
#      — both inferred from the artifact, nothing else to supply.
#   2. OLD: a GitHub release is cut carrying the same typed catalog YAML.
#
# `version` is supplied here at release time — it is intentionally NOT stored in
# source metadata.yaml — and `compile` stamps it into the artifact.
#
# Auth: no secrets for publish. grcli mints a GitHub Actions OIDC token (id-token:
# write below) for the grc.store hub sync and cosign keyless signing.
#
# compile produces all three typed catalogs (capabilities / threats / controls), and
# every asset type is run through grcli validate against the Gemara CUE spec (below).
# capabilities has been verified end-to-end; threats and controls take the same path
# but have not yet been exercised through a full validate + publish run.
#
# Unlike batch-release.yml (a best-effort sweep that never fails CI), this single-asset
# workflow is the HARD GATE: any failing stage fails the job. The final summary step
# runs `if: always()` purely to report — it renders a Source/Result table (links to the
# GitHub release + grc.store page on success, a parsed reason on failure) plus a
# per-stage pipeline line, and never changes the job's pass/fail.

on:
  workflow_dispatch:
    inputs:
      build_target:
        description: "Catalog to release — family/service (e.g. storage/object)"
        required: true
        type: string
      asset_type:
        description: "Asset type to release"
        required: true
        type: choice
        options:
          - capabilities
          - threats
          - controls
          - mappings
      version:
        description: "Release version (e.g. v2026.04 or v2026.04-rc1) — stamped into the artifact"
        required: true
        type: string
      dry_run:
        description: "Dry run — compile + validate + build the bundle, but do not push to grc.store or cut a GitHub release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write # cut the GitHub release
  id-token: write # grcli mints a GHA OIDC token for hub auth + cosign keyless signing

jobs:
  release:
    runs-on: ubuntu-latest
    # Inputs are funneled through env to keep free-text values out of run: scripts.
    env:
      BUILD_TARGET: ${{ inputs.build_target }}
      ASSET_TYPE: ${{ inputs.asset_type }}
      VERSION: ${{ inputs.version }}
      DRY_RUN: ${{ inputs.dry_run }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify source file exists
        id: verify
        run: |
          # Mappings are a directory of standalone MappingDocuments; every other
          # asset type is a single source file.
          if [ "$ASSET_TYPE" = "mappings" ]; then
            dir="catalogs/${BUILD_TARGET}/mappings"
            if ! ls "${dir}"/*.yaml >/dev/null 2>&1; then
              echo "::error::No mapping documents under ${dir}/ — check the build target."
              exit 1
            fi
            echo "Source: ${dir}/*.yaml"
          else
            src="catalogs/${BUILD_TARGET}/${ASSET_TYPE}.yaml"
            if [ ! -f "$src" ]; then
              echo "::error::No source file at ${src} — check the build target and asset type."
              exit 1
            fi
            echo "Source: ${src}"
          fi

      - uses: actions/setup-go@v5
        with:
          go-version-file: delivery-toolkit/go.mod

      - name: Compile the typed catalog
        id: compile
        working-directory: delivery-toolkit
        # tee to a log so the summary step can parse a friendly reason if this fails.
        # pipefail (the GHA default) keeps the step's exit status that of `go run`.
        run: |
          go run . compile \
            --build-target "$BUILD_TARGET" \
            --type "$ASSET_TYPE" \
            --version "$VERSION" \
            --catalogs-dir ../catalogs \
            --output-dir ../artifacts 2>&1 | tee /tmp/compile.log

      - name: Locate compiled artifact(s)
        id: artifact
        run: |
          # Build the list of compiled artifacts the downstream steps iterate.
          # Single-file asset types yield one path; mappings yield one per framework.
          if [ "$ASSET_TYPE" = "mappings" ]; then
            find "artifacts/${BUILD_TARGET}/mappings" -name '*.yaml' | sort > /tmp/artifacts.list
          else
            find "artifacts/${BUILD_TARGET}" -name "${ASSET_TYPE}.yaml" | head -1 > /tmp/artifacts.list
          fi
          if [ ! -s /tmp/artifacts.list ]; then
            echo "::error::compile produced no artifact(s) for ${ASSET_TYPE} under artifacts/${BUILD_TARGET}"
            exit 1
          fi
          first="$(head -1 /tmp/artifacts.list)"
          count="$(grep -c . /tmp/artifacts.list)"
          gemara_version="$(grep -E '^[[:space:]]*gemara-version:' "$first" | head -1 | awk '{print $2}')"
          # author.id (8-space indent, under author:) + metadata.id (4-space indent),
          # lowercased, drive the grc.store link: <author>/<id>/versions/<ver>. All
          # artifacts in a run share one author; the id is per-document for mappings.
          author="$(awk '/^    author:/{a=1} a && /^        id:/{print tolower($2); exit}' "$first")"
          artifact_id="$(awk '/^metadata:/{m=1} m && /^    id:/{print tolower($2); exit}' "$first")"
          {
            echo "gemara_version=${gemara_version}"
            echo "author=${author}"
            echo "artifact_id=${artifact_id}"
            echo "count=${count}"
          } >> "$GITHUB_OUTPUT"
          echo "Compiled ${count} artifact(s) (gemara ${gemara_version}, author ${author}); first: ${first}"

      # grcli, pulled from its OCI distribution exactly as documented.
      - uses: oras-project/setup-oras@v1
      - name: Install grcli
        # Pinned for reproducibility (not :latest). Bump deliberately after testing.
        env:
          GRCLI_VERSION: v0.2.2
        run: |
          oras pull "ghcr.io/revanite-io/grcli:${GRCLI_VERSION}" --platform linux/amd64
          sudo install grcli /usr/local/bin/grcli
          grcli --version

      # validate shells out to `cue vet`; publish keyless-signs via `cosign`.
      - name: Install cue
        run: go install cuelang.org/go/cmd/cue@v0.16.1
      - uses: sigstore/cosign-installer@v3

      - name: Validate against the Gemara spec
        id: validate
        env:
          GEMARA_VERSION: ${{ steps.artifact.outputs.gemara_version }}
        run: |
          git clone --depth 1 --branch "$GEMARA_VERSION" \
            https://github.com/gemaraproj/gemara /tmp/gemara-spec 2>&1 | tee /tmp/validate.log
          # Validate every compiled artifact; any failure fails the gate.
          rc=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            echo "::group::validate ${f}"
            grcli validate -f "$f" --spec /tmp/gemara-spec 2>&1 | tee -a /tmp/validate.log || rc=1
            echo "::endgroup::"
          done < /tmp/artifacts.list
          exit $rc

      # NEW publishing step: push the typed catalog(s) to grc.store. Each compiled
      # artifact is its own grc.store repository (<author>/<metadata.id>).
      - name: Publish to grc.store
        id: publish
        run: |
          rc=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            echo "::group::publish ${f}"
            if [ "$DRY_RUN" = "true" ]; then
              grcli publish "$f" --dry-run --output artifacts/oci 2>&1 | tee -a /tmp/publish.log || rc=1
            else
              grcli publish "$f" 2>&1 | tee -a /tmp/publish.log || rc=1
            fi
            echo "::endgroup::"
          done < /tmp/artifacts.list
          exit $rc

      # Augmented old flow: cut a GitHub release carrying the single typed catalog.
      # (Redundant with grc.store — kept per "augment"; safe to drop later.)
      - name: Cut GitHub release
        id: release
        if: ${{ inputs.dry_run == false }}
        run: |
          prerelease=""
          case "$VERSION" in *rc*) prerelease="--prerelease" ;; esac
          # Per-target release tagged <family>/<service>/<version>, identical to
          # batch-release.yml so the single and batch paths converge on the SAME
          # release. Within a target the asset basenames (capabilities/threats/
          # controls.yaml, or mappings/threats-<framework>.yaml) are unique, so each
          # artifact uploads under its plain name. The first asset for a target creates
          # the release; later ones upload into it.
          tag="${BUILD_TARGET}/${VERSION}"
          mapfile -t files < /tmp/artifacts.list
          { gh release create "$tag" "${files[@]}" \
              --title "${BUILD_TARGET} ${VERSION}" \
              --notes "Release of ${BUILD_TARGET} typed catalogs (${VERSION}), published to grc.store." \
              $prerelease \
            || gh release upload "$tag" "${files[@]}" --clobber; } 2>&1 | tee /tmp/release.log

      # Report-only: runs even when a stage above failed, never changes job status.
      - name: Write job summary
        if: always()
        env:
          AUTHOR: ${{ steps.artifact.outputs.author }}
          ARTIFACT_ID: ${{ steps.artifact.outputs.artifact_id }}
          COUNT: ${{ steps.artifact.outputs.count }}
          O_VERIFY: ${{ steps.verify.outcome }}
          O_COMPILE: ${{ steps.compile.outcome }}
          O_LOCATE: ${{ steps.artifact.outcome }}
          O_VALIDATE: ${{ steps.validate.outcome }}
          O_PUBLISH: ${{ steps.publish.outcome }}
          O_RELEASE: ${{ steps.release.outcome }}
        # set +e: this is a best-effort reporter — it must always finish and write the
        # summary, so it overrides the shell's default errexit.
        run: |
          set +e

          # Flatten multi-line tool output into one table-cell-safe phrase.
          sanitize() { tr '\n' ' ' | sed -E -e 's/[[:space:]]+/ /g' -e 's/\|/\\|/g' -e 's/^ //' -e 's/ $//'; }

          # Friendly one-liner for a failed `compile` (drop the cobra usage dump; keep
          # the "Error: <path>: <message>" line, minus the path).
          friendly_compile() {
            local msg
            msg="$(printf '%s\n' "$1" | grep -m1 '^Error:' | sed -E 's/^Error: [^:]*: //')"
            [ -z "$msg" ] && msg="$(printf '%s\n' "$1" | grep -vE '^[[:space:]]*$' | head -1)"
            printf '%s' "$msg" | sanitize
          }

          # Friendly one-liner for a failed `grcli validate` — surface cue's top-level
          # error lines, dropping indented locations and the FAIL/grcli summary lines.
          friendly_validate() {
            local all n shown
            all="$(printf '%s\n' "$1" | grep -E '^[^[:space:]].+: ' | grep -vE '^(FAIL|grcli|panic|Error)' | sed -E 's/: *$//' | sort -u)"
            n="$(printf '%s' "$all" | grep -c .)"
            shown="$(printf '%s\n' "$all" | head -3 | paste -sd ';' - | sed 's/;/; /g')"
            if [ -z "$shown" ]; then
              printf '%s\n' "$1" | grep -vE '^[[:space:]]*$' | tail -2 | sanitize
              return
            fi
            { if [ "$n" -gt 3 ]; then printf '%s (+%d more)' "$shown" "$((n - 3))"; else printf '%s' "$shown"; fi; } | sanitize
          }

          # Plain-text stage status for the pipeline line.
          stat() { case "$1" in success) printf 'ok' ;; failure) printf 'FAIL' ;; skipped) printf 'skipped' ;; *) printf 'n/a' ;; esac; }

          # Source cell + a label for "N artifacts" differ for the multi-document
          # mappings type vs the single-file asset types.
          if [ "$ASSET_TYPE" = "mappings" ]; then
            source_cell="catalogs/${BUILD_TARGET}/mappings/"
            verify_fail="Failed: no mapping documents under \`catalogs/${BUILD_TARGET}/mappings/\`"
          else
            source_cell="catalogs/${BUILD_TARGET}/${ASSET_TYPE}.yaml"
            verify_fail="Failed: no source file at \`${source_cell}\`"
          fi

          # First failing stage wins; otherwise it's a success (or a dry-run build).
          if [ "$O_VERIFY" = "failure" ]; then
            result="$verify_fail"
          elif [ "$O_COMPILE" = "failure" ]; then
            result="Failed: compile — $(friendly_compile "$(cat /tmp/compile.log 2>/dev/null)")"
          elif [ "$O_LOCATE" = "failure" ]; then
            result="Failed: compile produced no artifact(s) for ${ASSET_TYPE}"
          elif [ "$O_VALIDATE" = "failure" ]; then
            result="Failed: schema validation — $(friendly_validate "$(cat /tmp/validate.log 2>/dev/null)")"
          elif [ "$O_PUBLISH" = "failure" ]; then
            result="Failed: publish to grc.store — $(tail -3 /tmp/publish.log 2>/dev/null | sanitize)"
          elif [ "$O_RELEASE" = "failure" ]; then
            result="Failed: GitHub release — $(tail -3 /tmp/release.log 2>/dev/null | sanitize)"
          elif [ "$DRY_RUN" = "true" ]; then
            result="Built (dry run, not published)"
          else
            gh_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${BUILD_TARGET}/${VERSION}"
            if [ "$ASSET_TYPE" = "mappings" ]; then
              grc_url="https://grc.store/${AUTHOR}"
              result="Released ${COUNT} mapping doc(s) — [GitHub release](${gh_url}) · [grc.store](${grc_url})"
            else
              grc_url="https://grc.store/${AUTHOR}/${ARTIFACT_ID}/versions/${VERSION}"
              result="Released — [GitHub release](${gh_url}) · [grc.store](${grc_url})"
            fi
          fi

          {
            echo "## Release ${BUILD_TARGET} ${ASSET_TYPE} ${VERSION} (dry_run=${DRY_RUN})"
            echo ""
            echo "Pipeline: compile $(stat "$O_COMPILE") · validate $(stat "$O_VALIDATE") · publish $(stat "$O_PUBLISH") · release $(stat "$O_RELEASE")"
            echo ""
            echo "| Source | Result |"
            echo "| --- | --- |"
            echo "| \`${source_cell}\` | ${result} |"
          } >> "$GITHUB_STEP_SUMMARY"
